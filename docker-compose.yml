services:
  db:
    image: library/mariadb
    container_name: "mariadb"
    volumes:
      - ./scripts/stats.sql:/docker-entrypoint-initdb.d/dump.sql
    restart: on-failure
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
    networks:
      - internal_network
  gopher:
    build: .
    command: bin/wait-for-it db:3306 -- bundle exec gopher2000 gopherpedia.rb
    container_name: "gopherpedia"
    restart: on-failure
    environment:
      GOPHER_PORT: 76
      GOPHERPEDIA_DB_URI: 'mysql2://root:@db/gopherpedia'
    ports:
      - "76:76"
    depends_on:
      - db
    tty: true
    stdin_open: true
    # volumes:
    #   - .:/app
    #   - bundle_cache:/usr/local/bundle
    networks:
      - internal_network
      - external_network
networks:
  external_network:
  internal_network:
    internal: true
volumes:
  bundle_cache:
